services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  unified-service:
    build:
      context: ./backend/services/unified-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5007
      UNIFIED_SERVICE_PORT: 5007
    expose:
      - "5007"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5007/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 25s

  youtube-playlist-service:
    build:
      context: ./backend/services/youtube-playlist-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PLAYLIST_SERVICE_PORT: 5005
      FILE_SERVICE_URL: http://unified-service:5007
      PROBLEM_SERVICE_URL: http://unified-service:5007
    depends_on:
      unified-service:
        condition: service_healthy
    expose:
      - "5005"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5005/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 25s

  profile-analysis-service:
    build:
      context: ./backend/services/profile-analysis-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PROFILE_SERVICE_PORT: 5006
      MONGO_URI: mongodb://mongodb:27017/algonote
      FILE_SERVICE_URL: http://unified-service:5007
    depends_on:
      mongodb:
        condition: service_healthy
      unified-service:
        condition: service_healthy
    expose:
      - "5006"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5006/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  gateway:
    build:
      context: ./backend/gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5001
      UNIFIED_SERVICE_URL: http://unified-service:5007
      PLAYLIST_SERVICE_URL: http://youtube-playlist-service:5005
      PROFILE_SERVICE_URL: http://profile-analysis-service:5006
    depends_on:
      unified-service:
        condition: service_healthy
      youtube-playlist-service:
        condition: service_healthy
      profile-analysis-service:
        condition: service_healthy
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5001/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  client:
    build:
      context: ./client
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mongo-data:
